<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>みなのは360°ギャラリー</title>

<meta property="og:title" content="みなのは360°ギャラリー" />
<meta property="og:description" content="360度パノラマで楽しむバーチャル展示会です。" />
<meta property="og:image" content="https://tzumd2022.github.io/minano-360/title/title.png" />
<meta property="og:type" content="website" />
<meta name="twitter:card" content="summary_large_image" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Rounded+Mplus+1c:wght@500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

<style>
html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;font-family:'Noto Sans JP', sans-serif;background-color:#000;}
#panorama{width:100%;height:100vh;}

/* ----------------------------------
   スタート画面（QR読み取り直後）
---------------------------------- */
#startScreen{
  position:absolute;inset:0;z-index:9999;
  display:flex;
  flex-direction: column;
  justify-content:center;
  align-items:center;
  background:rgba(15,15,15,0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  transition: opacity 0.8s ease, visibility 0.8s ease;
  padding: 20px;
  box-sizing: border-box;
}

.title-image {
  width: 85%;
  max-width: 500px;
  height: auto;
  margin-bottom: 35px;
}

#startButton{
  font-family: 'Rounded Mplus 1c', sans-serif;
  font-weight: 700;
  padding: 16px 55px;
  font-size: 20px;
  letter-spacing: 1px;
  color: #fff;
  border: 2px solid rgba(255,255,255,0.7);
  border-radius: 40px;
  cursor:pointer;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  transition: all 0.3s ease;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
#startButton:active { transform: scale(0.92); background: rgba(255,255,255,0.25); }

/* 横画面推奨アナウンス */
.landscape-hint {
  margin-top: 35px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  color: rgba(255,255,255,0.7);
  font-size: 13px;
  letter-spacing: 0.5px;
  font-weight: 500;
  text-shadow: 0 2px 4px rgba(0,0,0,0.5);
}

/* スマホ回転アニメーションアイコン */
.rotate-icon {
  width: 28px;
  height: 28px;
  animation: rotatePhone 3s ease-in-out infinite;
}

@keyframes rotatePhone {
  0%, 10%  { transform: rotate(0deg); }
  40%, 60% { transform: rotate(-90deg); }
  90%, 100% { transform: rotate(0deg); }
}

/* ----------------------------------
   移動ボタン・UIパーツ
---------------------------------- */
.placeButton{
  font-family: 'Rounded Mplus 1c', sans-serif;
  font-weight: 700;
  background: rgba(15,15,15,0.85);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  color:white;
  padding:12px 20px;
  border-radius: 24px;
  border: 1px solid rgba(255,255,255,0.25);
  text-align:center;
  font-size:14px;
  min-width:110px;
  box-shadow:0 6px 20px rgba(0,0,0,0.4);
}
.placeButton .move {
  font-family: 'Rounded Mplus 1c', sans-serif;
  font-weight: 500;
  font-size:9px;
  color: #bbb;
  margin-top:3px;
  letter-spacing: 0.5px;
}

.galleryPoint{
  background: rgba(15,15,15,0.7);
  border: 4px solid #fff;
  color: #fff;
  border-radius: 50%;
  width: 70px;
  height: 70px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0;
  box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.6);
  animation: pulse 2.5s infinite; 
}
.galleryPoint svg { width: 32px; height: 32px; }

@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.5); }
  70% { box-shadow: 0 0 0 20px rgba(255, 255, 255, 0); }
  100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
}

/* ギャラリーポップアップ */
#galleryOverlay{
  position:fixed;
  inset:0;
  z-index:10000;
  background:rgba(10,10,10,0.92);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.4s ease, visibility 0.4s ease;
}
#galleryOverlay.open{ opacity: 1; visibility: visible; }

/* 写真説明（キャプション）表示エリア */
#galleryCaption {
  position: absolute;
  bottom: 85px; /* ドットエリアの上 */
  left: 50%;
  transform: translateX(-50%);
  width: 85%;
  max-width: 600px;
  text-align: center;
  color: #fff;
  font-size: 15px;
  font-weight: 500;
  line-height: 1.5;
  letter-spacing: 0.5px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.8);
  background: rgba(0, 0, 0, 0.6);
  padding: 10px 18px;
  border-radius: 8px;
  pointer-events: none;
  z-index: 10002;
  display: none;
}

#galleryControlArea{
  position:absolute;
  bottom: 30px;
  left:50%;
  transform:translateX(-50%);
  z-index: 10001;
}
#galleryDots{
  display: flex; gap: 10px; justify-content: center; align-items: center;
  background: rgba(255,255,255,0.1); padding: 8px 18px; border-radius: 20px;
}
.galleryDot{ width: 9px; height: 9px; border-radius: 50%; background: rgba(255,255,255,0.3); cursor: pointer; }
.galleryDot.active{ background: #fff; transform: scale(1.3); }

#galleryImgWrap{ 
  width:100%; height:100%; display:flex; align-items:center; justify-content:center; overflow:hidden; 
  will-change: transform;
  transform: translateZ(0);
}
#galleryImg{ 
  max-width:92vw; max-height:76vh; object-fit:contain; border-radius:6px; box-shadow: 0 15px 40px rgba(0,0,0,0.8); 
  will-change: opacity;
  backface-visibility: hidden;
}

#galleryClose{
  position:absolute; top:20px; right:24px; background:rgba(255,255,255,0.15); color:white;
  border:none; border-radius:50%; width: 46px; height: 46px; font-size:28px;
  display:flex; align-items:center; justify-content:center; 
  z-index: 10010 !important; 
  pointer-events: auto !important; 
  cursor: pointer;
}
.galleryArrow{ position:absolute; top:50%; transform:translateY(-50%); background:none; color:white; border:none; width:60px; height:60px; font-size:40px; text-shadow: 0 2px 10px rgba(0,0,0,0.6); }
#galleryPrev{left:12px;} #galleryNext{right:12px;}
</style>
</head>
<body>

<div id="startScreen">
  <img src="title/title.png" alt="みなのは360°ギャラリー" class="title-image">
  <button id="startButton">タップしてスタート！</button>
  <div class="landscape-hint">
    <svg class="rotate-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2" /><path d="M12 18h.01" /><path d="M19 7H5" /><path d="M19 17H5" /></svg>
    <span>横画面でのご鑑賞を推奨いたします</span>
  </div>
</div>

<div id="panorama"></div>

<div id="galleryOverlay">
  <button id="galleryClose">×</button>
  <div id="galleryImgWrap">
    <img id="galleryImg" src="" alt="gallery">
  </div>
  
  <div id="galleryCaption"></div>
  
  <div id="galleryControlArea"><div id="galleryDots"></div></div>
  <button class="galleryArrow" id="galleryPrev">‹</button>
  <button class="galleryArrow" id="galleryNext">›</button>
</div>

<script>
/* =====================================================
   ギャラリーデータ定義 ＆ 個別キャプション設定
   ===================================================== */
const GALLERIES = {
  gallery01:{ 
    dir:"gallery/gallery01", 
    captions: [
      "みんながいつでも弾けるピアノ",
      "某CMソングの楽譜"
    ]
  },
  gallery02:{ 
    dir:"gallery/gallery02", 
    captions: [
      "お菓子を食べることができてお菓子づくりもできますよ",
      "こどもたちと作ったお好み焼き(5/25)",
      "こどもたちと作ったピザ(5/25)",
      "いろいろな料理にも挑戦できます"
    ]
  },
  gallery03:{ 
    dir:"gallery/gallery03", 
    captions: [
      "学生たちによって描かれたウォールペイント「ナイショの地図」(2021)"
    ]
  },
  gallery04:{ 
    dir:"gallery/gallery04", 
    captions: ["こどもたちや施設職員が持ち寄った本", "ボードゲームやテーブルゲーム", "ビデオゲームと絵本"]
  },
  gallery05:{ 
    dir:"gallery/gallery05", 
    captions: ["おっきいくまさん"]
  },
  gallery06:{ 
    dir:"gallery/gallery06", 
    captions: ["子供達が作ったガラス絵の具のアート", "ガラス絵の具のアート制作風景", "かわいい人気キャラクター", "ハロウィンのガラス絵の具アート", "こどもたちには様々な個性があります"]
  },
  gallery07:{ 
    dir:"gallery/gallery07", 
    captions: ["みなのはの軌跡", "今までのみなのはの活動が見れます", "思い出を見返したいときや説明によく使われます"] 
  },
  gallery08:{ 
    dir:"gallery/gallery08", 
    captions: ["制作で自由にのびのび使えるツールや材料", "幅広く制作活動ができます", "自然の恵みや普段捨てるものも"]
  },
  gallery09:{ 
    dir:"gallery/gallery09", 
    captions: ["展示作品制作風景(5/15)", "展示作品制作風景(5/15)", "展示作品制作風景(6/1)", "展示作品制作風景(6/1)", "展示作品制作風景(6/1)", "展示作品制作風景(6/5)"]
  },
  gallery10:{ 
    dir:"gallery/gallery10", 
    captions: ["こどもたちの作品", "大小様々な作品が見られます", "大人には無い感性も見られて興味深いです"]
  },
};

let currentGallery = null;
let currentIndex   = 0;
let preloadedImages = [];

const overlay       = document.getElementById("galleryOverlay");
const dotsContainer = document.getElementById("galleryDots");
const img           = document.getElementById("galleryImg");
const caption       = document.getElementById("galleryCaption");
const btnClose      = document.getElementById("galleryClose");
const btnPrev       = document.getElementById("galleryPrev");
const btnNext       = document.getElementById("galleryNext");

function preloadGalleryImages(galleryId) {
  preloadedImages = [];
  const g = GALLERIES[galleryId];
  for (let i = 0; i < g.captions.length; i++) {
    const num = String(i + 1).padStart(2, "0");
    const pImg = new Image();
    pImg.src = `${g.dir}/${num}.jpg`;
    preloadedImages.push(pImg);
  }
}

function openGallery(galleryId){
  // ✨ 【修正】新しく開く直前に、前の残像を消すために画像URLと説明を一度空っぽにする
  img.src = "";
  caption.textContent = "";
  caption.style.display = "none";

  currentGallery = galleryId;
  currentIndex   = 0;
  preloadGalleryImages(galleryId); 
  showImage();
  overlay.classList.add("open");
}

function showImage(){
  const g     = GALLERIES[currentGallery];
  const total = g.captions.length;
  const idx   = currentIndex;
  const num   = String(idx + 1).padStart(2,"0");
  
  img.src     = `${g.dir}/${num}.jpg`;
  
  const text = g.captions[idx];
  if (text && text.trim() !== "") {
    caption.textContent = text;
    caption.style.display = "block";
  } else {
    caption.textContent = "";
    caption.style.display = "none";
  }
  
  dotsContainer.innerHTML = "";
  for(let i = 0; i < total; i++) {
    const dot = document.createElement("div");
    dot.classList.add("galleryDot");
    if(i === idx) dot.classList.add("active");
    dot.addEventListener("click", (e) => {
      e.stopPropagation();
      currentIndex = i;
      showImage();
    });
    dotsContainer.appendChild(dot);
  }
  btnPrev.style.visibility = idx > 0         ? "visible" : "hidden";
  btnNext.style.visibility = idx < total - 1 ? "visible" : "hidden";
}

function closeGallery(){ 
  overlay.classList.remove("open"); 
  currentGallery = null; 
  preloadedImages = []; 
  // ✨ 【修正】閉じた瞬間にも念のため画像を空っぽにしておく
  setTimeout(() => { img.src = ""; }, 400); 
}
function galleryPrev(){ if(currentGallery && currentIndex > 0){ currentIndex--; showImage(); } }
function galleryNext(){
  if(currentGallery){
    const g = GALLERIES[currentGallery];
    if(currentIndex < g.captions.length - 1){ currentIndex++; showImage(); }
  }
}

btnClose.addEventListener("click", (e) => { e.stopPropagation(); closeGallery(); });
btnClose.addEventListener("touchend", (e) => { e.stopPropagation(); e.preventDefault(); closeGallery(); }, {passive: false});

btnPrev.addEventListener("click",  galleryPrev);
btnNext.addEventListener("click",  galleryNext);

let touchStartX = 0;
overlay.addEventListener("touchstart", e => { touchStartX = e.touches[0].clientX; }, {passive:true});
overlay.addEventListener("touchend", e => {
  if (e.target === btnClose || btnClose.contains(e.target)) return;

  const dx = e.changedTouches[0].clientX - touchStartX;
  if(Math.abs(dx) > 40){ if(dx < 0) galleryNext(); else galleryPrev(); }
}, {passive:true});

function createNavButton(div, args){
  div.classList.add("placeButton");
  div.innerHTML=`<div>${args.label}</div><div class="move">TAP TO MOVE</div>`;
}
function createGalleryPoint(div, args){
  div.classList.add("galleryPoint");
  div.innerHTML = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>`;
  div.addEventListener("click", e => { e.stopPropagation(); openGallery(args.galleryId); });
}

/* =====================================================
   Pannellum ビューアー初期化
   ===================================================== */
const viewer = pannellum.viewer('panorama',{
  default:{ 
    firstScene:"entrance", 
    sceneFadeDuration:1000,
    autoLoad: true,
    showLoadingIndicator: true,
    showControls: false
  },
  scenes:{
    entrance:{
      type:"equirectangular",
      panorama:"https://tzumd2022.github.io/minano-360/images/01_entrance.jpg",
      yaw:110, pitch:0, hfov:100,
      hotSpots:[
        { pitch:-25, yaw:110, type:"scene", sceneId:"hallway", createTooltipFunc:createNavButton, createTooltipArgs:{label:"おくへすすむ"} }
      ]
    },
    hallway:{
      type:"equirectangular",
      panorama:"https://tzumd2022.github.io/minano-360/images/02_hallway.jpg",
      yaw:-40, pitch:0, hfov:110,
      hotSpots:[
        { pitch:-25, yaw:140, type:"scene", sceneId:"entrance", createTooltipFunc:createNavButton, createTooltipArgs:{label:"いりぐち"} },
        { pitch:-25, yaw:-160, type:"scene", sceneId:"roomB", createTooltipFunc:createNavButton, createTooltipArgs:{label:"つくるへや"} },
        { pitch:-25, yaw:30, type:"scene", sceneId:"roomA2", targetYaw:-100, createTooltipFunc:createNavButton, createTooltipArgs:{label:"みつけるへや"} },
        { pitch:-30, yaw:-110, type:"info", createTooltipFunc:createGalleryPoint, createTooltipArgs:{galleryId:"gallery01"} }
      ]
    },
    roomA2:{
      type:"equirectangular",
      panorama:"https://tzumd2022.github.io/minano-360/images/03_roomA_1.jpg",
      yaw:-100, pitch:0, hfov:100,
      hotSpots:[
        { pitch:-15, yaw:80, type:"scene", sceneId:"hallway", targetYaw:-40, createTooltipFunc:createNavButton, createTooltipArgs:{label:"ろうか"} },
        { pitch:-15, yaw:150, type:"scene", sceneId:"roomA1", targetYaw:-170, createTooltipFunc:createNavButton, createTooltipArgs:{label:"おくへすすむ"} },
        { pitch:-20, yaw:-170, type:"info", createTooltipFunc:createGalleryPoint, createTooltipArgs:{galleryId:"gallery05"} },
        { pitch:-10, yaw:-125, type:"info", createTooltipFunc:createGalleryPoint, createTooltipArgs:{galleryId:"gallery06"} },
        { pitch:-15, yaw:50, type:"info", createTooltipFunc:createGalleryPoint, createTooltipArgs:{galleryId:"gallery07"} }
      ]
    },
    roomA1:{
      type:"equirectangular",
      panorama:"https://tzumd2022.github.io/minano-360/images/04_roomA_2.jpg",
      yaw:-170, pitch:0, hfov:100,
      hotSpots:[
        { pitch:-15, yaw:-40, type:"scene", sceneId:"roomA2", targetYaw:-100, createTooltipFunc:createNavButton, createTooltipArgs:{label:"てまえにもどる"} },
        { pitch:-5, yaw:40, type:"info", createTooltipFunc:createGalleryPoint, createTooltipArgs:{galleryId:"gallery02"} },
        { pitch:-10, yaw:150, type:"info", createTooltipFunc:createGalleryPoint, createTooltipArgs:{galleryId:"gallery03"} },
        { pitch:-20, yaw:-110, type:"info", createTooltipFunc:createGalleryPoint, createTooltipArgs:{galleryId:"gallery04"} }
      ]
    },
    roomB:{
      type:"equirectangular",
      panorama:"https://tzumd2022.github.io/minano-360/images/05_roomB.jpg",
      yaw:150, pitch:-5, hfov:100,
      hotSpots:[
        { pitch:-25, yaw:-50, type:"scene", sceneId:"hallway", createTooltipFunc:createNavButton, createTooltipArgs:{label:"ろうか"} },
        { pitch:-15, yaw:0, type:"info", createTooltipFunc:createGalleryPoint, createTooltipArgs:{galleryId:"gallery08"} },
        { pitch:-5, yaw:150, type:"info", createTooltipFunc:createGalleryPoint, createTooltipArgs:{galleryId:"gallery09"} },
        { pitch:-5, yaw:-90, type:"info", createTooltipFunc:createGalleryPoint, createTooltipArgs:{galleryId:"gallery10"} }
      ]
    }
  }
});

/* =====================================================
   スタート画面非表示ロジック
   ===================================================== */
document.getElementById("startButton").addEventListener("click", ()=>{
  const startScreen = document.getElementById("startScreen");
  startScreen.style.opacity = "0";
  startScreen.style.pointerEvents = "none";
  setTimeout(() => { startScreen.style.visibility = "hidden"; }, 800);
});
</script>
</body>
</html>
